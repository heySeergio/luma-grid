name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx prisma generate

      - run: npx tsc --noEmit

      - run: npm run lint

      # Requiere el secret DATABASE_URL (Neon/Postgres con datos léxicos sembrados).
      - name: Regresión detector léxico
        run: npm run test:lexicon-detection
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
